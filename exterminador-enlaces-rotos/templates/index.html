<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 Exterminador de Enlaces Rotos | QA Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-group input {
            flex: 1;
            padding: 18px 25px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 18px 40px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card.success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .stat-card.danger {
            background: linear-gradient(135deg, #eb3349, #f45c43);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .results {
            display: none;
            animation: fadeInUp 0.8s;
        }

        .results.active {
            display: block;
        }

        .results h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .badge-ok {
            background: #d4edda;
            color: #155724;
        }

        .badge-error {
            background: #f8d7da;
            color: #721c24;
        }

        .url-cell {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .alert {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .card {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 Exterminador de Enlaces Rotos</h1>
            <p>Herramienta profesional de QA para análisis de enlaces</p>
        </div>

        <div class="card">
            <div class="input-group">
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="Ingresa la URL a analizar (ej: https://ejemplo.com)"
                    value="https://example.com"
                >
                <button class="btn btn-primary" onclick="analizar()" id="btnAnalizar">
                    <i class="fas fa-search"></i> Analizar
                </button>
            </div>

            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i> 
                <strong>Nota:</strong> Esta herramienta analiza los primeros 50 enlaces encontrados para optimizar el rendimiento.
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="color: #667eea; font-size: 1.2em; font-weight: bold;">Analizando enlaces...</p>
                <p style="color: #666; margin-top: 10px;">Esto puede tomar unos segundos</p>
            </div>

            <div class="results" id="results">
                <div class="stats" id="stats"></div>
                
                <h2><i class="fas fa-chart-bar"></i> Resultados del Análisis</h2>
                <div id="infoUrl"></div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>URL</th>
                                <th>Status</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analizar() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                alert('Por favor ingresa una URL');
                return;
            }

            // UI
            document.getElementById('btnAnalizar').disabled = true;
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');

            try {
                const response = await fetch('/analizar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Error al analizar');
                }

                mostrarResultados(data);

            } catch (error) {
                alert('Error: ' + error.message);
                console.error('Error:', error);
            } finally {
                document.getElementById('btnAnalizar').disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        }

        function mostrarResultados(data) {
            // Estadísticas
            const stats = data.estadisticas;
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total}</div>
                    <div class="stat-label">Total Analizados</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value">${stats.ok}</div>
                    <div class="stat-label">Enlaces OK</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-value">${stats.rotos}</div>
                    <div class="stat-label">Enlaces Rotos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.porcentaje_rotos}%</div>
                    <div class="stat-label">% Rotos</div>
                </div>
            `;

            // Info URL
            document.getElementById('infoUrl').innerHTML = `
                <div class="alert alert-info">
                    <strong>URL Analizada:</strong> ${data.url_analizada}<br>
                    <strong>Total Enlaces Encontrados:</strong> ${data.total_enlaces}<br>
                    ${data.nota ? `<small>${data.nota}</small>` : ''}
                </div>
            `;

            // Tabla de resultados
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.resultados.forEach((resultado, index) => {
                const row = document.createElement('tr');
                const badgeClass = resultado.estado === 'OK' ? 'badge-ok' : 'badge-error';
                
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td class="url-cell" title="${resultado.url}">${resultado.url}</td>
                    <td>${resultado.status}</td>
                    <td><span class="badge ${badgeClass}">${resultado.estado}</span></td>
                `;
                
                tbody.appendChild(row);
            });

            // Mostrar resultados
            document.getElementById('results').classList.add('active');
        }

        // Enter key
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analizar();
            }
        });
    </script>
</body>
</html>
